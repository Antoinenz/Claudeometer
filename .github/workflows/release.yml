name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version $VERSION"
          node -e "
            const fs = require('fs');
            const confPath = 'src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(confPath, 'utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync(confPath, JSON.stringify(conf, null, 2) + '\n');
            const cargoPath = 'src-tauri/Cargo.toml';
            let cargo = fs.readFileSync(cargoPath, 'utf8');
            cargo = cargo.replace(/^version = \"[^\"]+\"/m, 'version = \"$VERSION\"');
            fs.writeFileSync(cargoPath, cargo);
          "

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libssl-dev \
            pkg-config

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          # The repo is now a Cargo workspace (src-tauri, crates/core,
          # crates/service all share one target dir at the repo root).
          workspaces: '. -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Claudeometer ${{ github.ref_name }}'
          releaseBody: |
            ## Claudeometer ${{ github.ref_name }}

            ### Installation
            - **Windows** — download the `.msi` or `.exe` installer
            - **macOS** — download the `.dmg` (universal: Apple Silicon + Intel)
            - **Linux** — download the `.deb` or `.AppImage`
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          args: ${{ matrix.args }}
